# ─── succl-tests Run Configuration ──────────────────────────────────────────
# 用法: bash run_succl_tests.sh --config example-run.conf
#
# 每个 [section] 定义一组测试，脚本按顺序依次执行所有 section。
# section 名称在同一配置文件内须唯一，且只能包含字母、数字、下划线和连字符，
# 因为它将被用于命名日志文件和可执行脚本。
#
# 必填字段:
#   mode        = single | multi
#                   single: 单节点，所有 GPU 在同一容器内
#                   multi : 多节点，通过 mpiexec + SSH 免密跨容器调度（需配置 multi-node.conf）
#   ops         = 算子名称（空格分隔可指定多个），或 all（全部算子）
#                 可选值: allreduce  allgather  alltoall  alltoallv  broadcast
#                         gather  hypercube  reduce  reducescatter  scatter  sendrecv
#   gpus        = GPU 数量（正整数）
#                   single 模式: 本节点参与测试的总卡数（即 mpiexec -n 的值）
#                   multi  模式: 每节点卡数（即 --host IP:gpus 中的 gpus 值）
#
# 可选字段（对应文档 §3.3.2，不填则使用默认值）:
#   min_bytes   = 最小消息大小（字节），须为 512 的倍数。默认: 512
#   max_bytes   = 最大消息大小，支持 K/M/G 后缀。默认: 1G
#   step_bytes  = 相邻 step 之间的固定字节增量（须为 512 倍数）; 0=使用 step_factor。默认: 0
#   step_factor = 相邻 step 之间的数据量倍增因子（step_bytes=0 时有效）。默认: 2
#   iters        = 计时迭代次数，覆盖 general.conf 中的 ITERS。默认: 继承 general.conf
#   warmup_iters = 预热迭代次数，覆盖 general.conf 中的 WARMUP_ITERS。默认: 继承 general.conf
# ─────────────────────────────────────────────────────────────────────────────

# 单节点 allreduce，8 卡，默认数据范围
[single_allreduce_8g]
mode        = single
ops         = allreduce
gpus        = 8
min_bytes   = 512
max_bytes   = 1G
step_bytes  = 0
step_factor = 2

# 单节点全算子，8 卡
[single_all_8g]
mode        = single
ops         = all
gpus        = 8
min_bytes   = 512
max_bytes   = 1G
step_bytes  = 0
step_factor = 2

# 多节点 allreduce，每节点 8 卡（需在 multi-node.conf 中配置节点 IP）
[multi_allreduce_8g]
mode        = multi
ops         = allreduce
gpus        = 8
min_bytes   = 512
max_bytes   = 1G
step_bytes  = 0
step_factor = 2

# 多节点多算子示例：同时测 allreduce 和 allgather
[multi_ar_ag_8g]
mode        = multi
ops         = allreduce allgather
gpus        = 8
min_bytes   = 512
max_bytes   = 1G
step_bytes  = 0
step_factor = 2
