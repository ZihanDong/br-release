# ─── succl-tests Multi-Node Configuration ───────────────────────────────────
# 默认路径（multi 模式 section 运行时自动加载）:
#   <script_dir>/configs/multi-node.conf
# 覆盖方式: --multi-config /path/to/multi-node.conf
#
# 本文件仅在 run config 中存在 mode=multi 的 section 时被加载。
# ─────────────────────────────────────────────────────────────────────────────

# ── SSH 端口 ─────────────────────────────────────────────────────────────────
# 对应 mpiexec 参数: --mca plm_rsh_args "-p SSH_PORT"
# 需与 setup_succl-tests.sh 中的 SSH_PORT 保持一致（默认 2222）
SSH_PORT="2222"

# ── MPI TCP 通信网卡 ──────────────────────────────────────────────────────────
# 两个参数互斥，INCLUDE 非空时忽略 EXCLUDE。
#
# 对应 mpiexec 参数: --mca btl_tcp_if_include <iface>
# 指定 MPI 仅使用的网卡；要求集群每个节点上都存在该网卡。
# 示例: "ens110f0"
MPI_IFACE_INCLUDE=""

# 对应 mpiexec 参数: --mca btl_tcp_if_exclude <iface[,iface...]>
# 排除不参与通信的网卡；INCLUDE 为空时生效。留空则不使用该参数。
# 示例: "lo"  或  "ens110f0,ens111f0"
MPI_IFACE_EXCLUDE="lo"

# ── SUCCL 缓冲区 ─────────────────────────────────────────────────────────────
# 对应 mpiexec 参数: -x SUCCL_BUFFSIZE=<value>
# 当集群有 4 台或更多机器时，SendRecv/Gather/Scatter/Hypercube/Alltoall/Alltoallv
# 需要设置为 16777216（16 MiB）才能达到最大数据量。留空表示使用库默认值。
SUCCL_BUFFSIZE=""

# ── 参与测试的节点 IP ─────────────────────────────────────────────────────────
# 每行填写一个 IP 地址，顺序任意（建议主节点放第一行）。
# 脚本读取此列表，结合 run config section 中的 gpus 值自动生成
# mpiexec --host IP1:gpus,IP2:gpus,... 参数。
MULTI_NODE_IPS=(
    10.9.1.10
    10.9.1.11
)
