# ─── succl-tests: 双节点全算子测试配置 ───────────────────────────────────────
# 节点: 172.25.198.36 (node1) + 172.25.198.37 (node2)，每节点 8 GPU
# 用法: bash run_succl_tests.sh --config configs/multi-2node-all-ops.conf
#
# 本文件按算子分组，便于独立排查单个算子问题。
# ─────────────────────────────────────────────────────────────────────────────

[multi_2node_allreduce]
mode        = multi
ops         = allreduce
gpus        = 8
min_bytes   = 512
max_bytes   = 512M
step_bytes   = 0
step_factor  = 2
iters        = 1
warmup_iters = 1

[multi_2node_allgather]
