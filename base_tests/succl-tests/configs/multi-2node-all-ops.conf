# ─── succl-tests: 双节点全算子测试配置 ───────────────────────────────────────
# 节点: 172.25.198.36 (node1) + 172.25.198.37 (node2)，每节点 8 GPU
# 用法: bash run_succl_tests.sh --config configs/multi-2node-all-ops.conf
#
# check=0       : 跳过结果校验，规避 libsuccl UMA16 多节点校验路径 segfault
# iters/warmup=1: 单次迭代，规避 libsuccl UMA16 多节点多迭代路径 segfault
# 上述两个限制均为绕过当前 SDK 版本的已知库 bug，待 SDK 修复后可移除。
# ─────────────────────────────────────────────────────────────────────────────

[multi_2node_allreduce]
mode         = multi
ops          = allreduce
gpus         = 8
min_bytes    = 512
max_bytes    = 512M
step_bytes   = 0
step_factor  = 2
check        = 0
iters        = 1
warmup_iters = 1

[multi_2node_allgather]
