# ─── succl-tests General Configuration ──────────────────────────────────────
# 默认路径（由 run_succl_tests.sh 在脚本开头自动加载）:
#   <script_dir>/configs/general.conf
# 覆盖方式: --general /path/to/general.conf
#
# 本文件对应文档 §3.3.3 suCCL操作参数 / §3.3.4 性能相关参数 / §3.3.5 测试选项。
# §3.3.1 GPU数量: nthreads(-t) 和 ngpus(-G) 均为"仅支持1"，已写死在脚本中，
#   不在此处配置以防误改。
# §3.3.2 数据扫描范围: min_bytes/max_bytes/step_bytes/step_factor 在 run config
#   的各 [section] 中按组配置。
# ─────────────────────────────────────────────────────────────────────────────

# ── §3.3.3 suCCL 操作参数 ────────────────────────────────────────────────────
REDUCE_OP="sum"     # -o <sum|prod|min|max|avg|all>
                    #   归约操作类型，仅对归约类原语有效（AllReduce/Reduce/ReduceScatter）
DATATYPE="float"    # -d <float|BF16>
                    #   数据类型
ROOT="0"            # -r <0|-1>
                    #   根节点；-1 表示遍历所有 rank 作为根节点（仅 Broadcast/Reduce 有效）

# ── §3.3.4 性能相关参数 ──────────────────────────────────────────────────────
ITERS="3"           # -n <1-20>   计时迭代次数（勿设置过大，否则会申请内存失败）
WARMUP_ITERS="3"    # -w <0-10>   预热迭代次数（不计时）
AGG_ITERS="1"       # -m <1-N>    每次迭代中聚合的操作数量
AVERAGE="1"         # -a <0/1/2/3> 带宽跨 rank 取值方式: 0=Rank0 1=Avg 2=Min 3=Max

# ── §3.3.5 测试选项 ──────────────────────────────────────────────────────────
PARALLEL_INIT="0"   # -p <0/1>   是否使用线程并行初始化 suCCL: 0=否 1=是
CHECK="1"           # -c <0/1>   是否检查结果正确性: 0=跳过(更快) 1=检查(GPU多时较慢)
BLOCKING="0"        # -z <0/1>   集合操作模式: 0=异步 1=阻塞（CPU在每次操作后等待同步）
SUPAGRAPH="0"       # --supagraph <N>  将迭代捕获为 SUPA Graph 并重复执行 N 次; 0=不启用

# ── 硬件相关 ─────────────────────────────────────────────────────────────────
BR_P2P_CHECK="0"    # 环境变量 BR_UMD_DEBUG_P2P_ACCESS_CHECK
                    #   壁砺106B/壁砺106C 芯片必须设为 0（当前仅支持0）
BR166_MODE="auto"   # BR166 UMA16 内存模式 (-k 1):
                    #   auto = 读取 /etc/succl-hw.conf 自动判断（由 setup 脚本写入）
                    #   0    = 强制使用标准模式
                    #   1    = 强制启用 BR166 UMA16 模式
