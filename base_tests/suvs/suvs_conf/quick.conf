# suVS Quick Test Configuration
# This configuration includes most plugins for comprehensive testing
# Supported plugins: GPU_INFO, SOFTWARE, PCIE BANDWIDTH, P2P BANDWIDTH, 
# MEMORY BANDWIDTH, VIDEO PERFORMANCE, POWER STRESS, 
# HBM MEMORY TEST: test0~test5, test7, test8 and test10.

actions:
- name: test_gpuinfo
  gpu_id: all
  plugin: gpuinfo

- name: test_software
  gpu_id: all
  plugin: software

- name: test_pciebw
  gpu_id: all
  plugin: pciebw
  device_to_host: true
  host_to_device: true
  pinned: true
  duration: 10

- name: test_p2p
  gpu_id: all
  plugin: p2p
  peers: all
  duration: 10

- name: test_membw
  gpu_id: all
  plugin: membw
  duration: 90

- name: test_spcpower
  gpu_id: all
  plugin: spcpower
  duration: 90

- name: test_hbm_0
  gpu_id: all
  plugin: hbm
  duration: 10
  block_num: 1024

- name: test_hbm_1
  gpu_id: all
  plugin: hbm
  duration: 10
  block_num: 1024
