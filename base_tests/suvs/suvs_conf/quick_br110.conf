# suVS Quick Test Configuration for BR110 Platform
# This configuration includes most plugins for comprehensive testing on BR110

actions:
- name: test_gpuinfo
  gpu_id: all
  plugin: gpuinfo

- name: test_software
  gpu_id: all
  plugin: software

- name: test_pciebw
  gpu_id: all
  plugin: pciebw
  device_to_host: true
  host_to_device: true
  pinned: true
  duration: 10

- name: test_p2p
  gpu_id: all
  plugin: p2p
  peers: all
  duration: 10

- name: test_membw
  gpu_id: all
  plugin: membw
  duration: 90

- name: test_spcpower
  gpu_id: all
  plugin: spcpower
  duration: 90

- name: test_hbm_0
  gpu_id: all
  plugin: hbm
  duration: 10
  block_num: 1024
