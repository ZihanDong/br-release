# ─────────────────────────────────────────────────────────────────────────────
# Registry 部署配置文件
# 由 setup-registry.sh 读取
# 镜像导入配置见 images.conf（由 update_images.sh 读取）
# ─────────────────────────────────────────────────────────────────────────────

# Registry 在本机的镜像数据存储目录
REGISTRY_STORAGE=/data/registry

# Registry NodePort 端口（集群内所有节点通过 <master-ip>:<port> 访问）
REGISTRY_PORT=32000

# 使用 HTTP（非安全模式，适合内网）
REGISTRY_HTTP=true

# Registry 资源部署到的 Kubernetes 命名空间
REGISTRY_K8S_NAMESPACE=kube-system
