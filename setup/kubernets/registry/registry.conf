# ─────────────────────────────────────────────────────────────────────────────
# Registry 部署配置文件
# 由 setup-registry.sh 读取
# ─────────────────────────────────────────────────────────────────────────────

# Registry 在本机的镜像数据存储目录
REGISTRY_STORAGE=/data/registry

# Registry NodePort 端口（集群内所有节点通过 <master-ip>:<port> 访问）
REGISTRY_PORT=32000

# 使用 HTTP（非安全模式，适合内网）
REGISTRY_HTTP=true

# Registry 资源部署到的 Kubernetes 命名空间
REGISTRY_K8S_NAMESPACE=kube-system

# ─────────────────────────────────────────────────────────────────────────────
# 镜像命名空间（Namespace）定义
#
# 格式：[namespace.<name>]
#   每个节定义一个 registry 命名空间，镜像推送后地址为：
#   <registry-addr>/<name>/<image>:<tag>
#
# 节内每行为一个路径（空行和 # 开头的行忽略）：
#   目录路径：递归扫描该目录及所有子目录下的 .tar / .tar.gz 文件
#   文件路径：直接导入该文件（支持标准镜像 .tar 和包含镜像的 .tar.gz）
# ─────────────────────────────────────────────────────────────────────────────

# base：基础 SDK 镜像
[namespace.base]
/data/release/2604rc/images/birensupa-sdk-26.04.beta1-br1xx.tar

# infer：推理 / vLLM 镜像
[namespace.infer]
/data/release/2604rc/images/birensupa-smartinfer-vllm-26.04.beta1-py310-pt2.8.0-br1xx.tar

# k8s：Kubernetes 组件（device plugin 等）
[namespace.k8s]
/data/release/2604rc/k8s/k8s_device_plugin_v0.7.6-188-899ca76.tar.gz
