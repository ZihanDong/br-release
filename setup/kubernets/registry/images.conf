# ─────────────────────────────────────────────────────────────────────────────
# 镜像导入配置文件
# 由 update_images.sh 读取
# ─────────────────────────────────────────────────────────────────────────────
#
# 每个 [namespace.<name>] 节定义一个命名空间，节内每行为一个路径：
#   - 文件路径（.tar 或 .tar.gz）：直接处理该文件
#   - 目录路径：递归扫描目录下所有 .tar / .tar.gz 文件
#
# 推送后镜像地址格式：<registry-addr>/<namespace>/<镜像名>:<tag>
# ─────────────────────────────────────────────────────────────────────────────

