# vLLM server config — MiniMax/MiniMax-M2.5 (chat MoE model, INT8 quantized)
# Parsed by utils/parse_config.sh; consumed by vllm/vllm_server.sh, vllm/run_docker.sh,
# utils/k8s_yaml_gen.sh.
#
# NOTE: tp=8 (single-node, whole machine). The production disaggregated (PD)
# deployment uses the separate *.p.conf / *.d.conf files under vllm/configs/.

framework=vllm                 # vllm | sglang | suinferllm

model_weights=minimax-m2.5

port=20027
served_model_name=
task=
dtype=auto

max_model_len=100000
max_num_seqs=8

tensor_parallel_size=8
pipeline_parallel_size=1
gpu_memory_utilization=0.75

enable_chunked_prefill=true
enforce_eager=false
distributed_executor_backend=mp
compilation_config='{"cudagraph_mode": "FULL_DECODE_ONLY"}'

# MiniMax MoE-specific env vars (exported inside container by vllm_server.sh)
extra_env="VLLM_BR_EMBEDDING_S0B=1 BRTB_CHUNK_PREFILL_ATTN_HIGH_PERFORMANCE=True BRTB_ENABLE_SCCL_FUSION=0 VLLM_BR_USE_FUSED_MINIMAX_MOE=1 VLLM_BR_USE_FUSED_ADD_RMSNORM_QKV_TP_ROPE_KVCACHE=0 SUCCL_REDUCE_SEQUENCE=0"

# MiniMax MoE-specific vLLM flags
extra_vllm_args="--enable_expert_parallel --no_enable_prefix_caching"

# Kubernetes deployment
k8s_nodeport=30802
