# vLLM server config — Qwen/Qwen3-32B (chat model)
# Parsed by utils/parse_config.sh; consumed by vllm/vllm_server.sh, vllm/run_docker.sh,
# utils/k8s_yaml_gen.sh.

framework=vllm                 # vllm | sglang | suinferllm

model_weights=qwen3-32b

port=28800
served_model_name=Qwen/Qwen3-32B
task=
dtype=auto

max_model_len=32768
max_num_seqs=64

tensor_parallel_size=2
pipeline_parallel_size=1
gpu_memory_utilization=0.8

enable_chunked_prefill=true
enforce_eager=false
distributed_executor_backend=mp
compilation_config='{"cudagraph_mode": "FULL_DECODE_ONLY"}'

# Kubernetes deployment
k8s_nodeport=30801
