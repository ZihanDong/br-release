# SGLang server config — Wan-AI/Wan2.2-I2V-A14B (image-to-video generation)
# Parsed by utils/parse_config.sh; consumed by sglang/sglang_server.sh, sglang/run_docker.sh.
#
# launch_mode=video_gen uses python3 server_sglang_video.sh (sglang.multimodal_gen
# online runtime, POST /v1/videos). The i2v task type is auto-detected from the
# diffusers model_index.json, so requests MUST include an input image
# (reference_url / input_reference); the server rejects i2v requests without one.
#
# IMPORTANT: weights must be in HuggingFace *diffusers* format (model_index.json).
# Use Wan-AI/Wan2.2-I2V-A14B-Diffusers. See model_registry.conf.

framework=sglang               # vllm | sglang | suinferllm
launch_mode=video_gen

model_weights=wan2.2-i2v-a14b

port=39001
served_model_name=Wan-AI/Wan2.2-I2V-A14B   # informational API label only

# Total cards = ulysses_degree × ring_degree × (cfg ? 2 : 1) = 4 × 1 × 2 = 8 (cfg2)
tensor_parallel_size=8
ulysses_degree=4
ring_degree=1
enable_cfg_parallel=true

# Offload (matches offline testcase_wan.py)
dit_layerwise_offload=False
text_encoder_cpu_offload=False
vae_cpu_offload=True

output_path=./outputs/wan2.2-i2v-a14b

extra_env=""
extra_sglang_args=""

# NOTE: Wan needs the c064 build (its own image). c059 (the qwen-image build) breaks
# Wan's UMT5 text encoder (RMSNormInfer / "Colmajor 2D" errors). The video_gen launch
# (sglang_launch.sh) self-installs cache_dit==1.3.4, runs VAE decode in bf16, and disables
# the VAE parallel-decode path; run_docker.sh propagates the entrypoint PYTHONPATH so the
# SUDNN JIT compiler can import br_generator (else VAE decode fails).
docker_image=birensupa-smartinfer-sglang:26.06.02-c064s001t001b24295-py310-pt2.9.0-br1xx
k8s_image=172.25.198.36:32000/infer/birensupa-smartinfer-sglang:26.06.02-c064s001t001b24295-py310-pt2.9.0-br1xx

# Kubernetes deployment
k8s_nodeport=30903
