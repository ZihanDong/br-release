# vLLM server config — BAAI/bge-m3 (embedding model)
# Parsed by utils/parse_config.sh; consumed by vllm/vllm_server.sh, vllm/run_docker.sh,
# utils/k8s_yaml_gen.sh.

framework=vllm                 # vllm | sglang | suinferllm

model_weights=bge-m3

port=28800
served_model_name=
task=embed
dtype=bfloat16

max_model_len=8192
max_num_seqs=64

tensor_parallel_size=1
pipeline_parallel_size=1
gpu_memory_utilization=0.8

enable_chunked_prefill=false
enforce_eager=true
distributed_executor_backend=
compilation_config=

# Kubernetes deployment
k8s_nodeport=30800
