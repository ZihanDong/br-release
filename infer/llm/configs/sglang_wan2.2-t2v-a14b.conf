# SGLang server config — Wan-AI/Wan2.2-T2V-A14B (text-to-video generation)
# Parsed by utils/parse_config.sh; consumed by sglang/sglang_server.sh, sglang/run_docker.sh.
#
# launch_mode=video_gen uses python3 server_sglang_video.sh (sglang.multimodal_gen
# online runtime, POST /v1/videos) instead of sglang.launch_server. Diffusion steps,
# prompt, size and image are PER-REQUEST, not launch args.
#
# IMPORTANT: weights must be in HuggingFace *diffusers* format (model_index.json).
# The ModelScope layout (high_noise_model/low_noise_model/*.pth) is NOT loadable —
# use Wan-AI/Wan2.2-T2V-A14B-Diffusers. See model_registry.conf.

framework=sglang               # vllm | sglang | suinferllm
launch_mode=video_gen

model_weights=wan2.2-t2v-a14b

port=39000
served_model_name=Wan-AI/Wan2.2-T2V-A14B   # informational API label only

# Total cards to allocate = ulysses_degree × ring_degree × (cfg ? 2 : 1)
#   8-card cfg2 (default): 4 × 1 × 2 = 8
#   8-card ring2 alt:      set ulysses_degree=4 ring_degree=2 enable_cfg_parallel=false
tensor_parallel_size=8
ulysses_degree=4
ring_degree=1
enable_cfg_parallel=true

# Offload (matches offline testcase_wan.py): VAE on CPU, text-encoder + DiT resident
dit_layerwise_offload=False
text_encoder_cpu_offload=False
vae_cpu_offload=True

output_path=./outputs/wan2.2-t2v-a14b

extra_env=""
extra_sglang_args=""

# NOTE: Wan needs the c064 build (its own image). c059 (the qwen-image build) breaks
# Wan's UMT5 text encoder (RMSNormInfer / "Colmajor 2D" errors). The video_gen launch
# (sglang_launch.sh) self-installs cache_dit==1.3.4, runs VAE decode in bf16, and disables
# the VAE parallel-decode path; run_docker.sh propagates the entrypoint PYTHONPATH so the
# SUDNN JIT compiler can import br_generator (else VAE decode fails). Validated 4-step t2v
# end-to-end (4-card; the committed 8-card needs all 8 GPUs healthy).
docker_image=birensupa-smartinfer-sglang:26.06.02-c064s001t001b24295-py310-pt2.9.0-br1xx
k8s_image=172.25.198.36:32000/infer/birensupa-smartinfer-sglang:26.06.02-c064s001t001b24295-py310-pt2.9.0-br1xx

# Kubernetes deployment
k8s_nodeport=30902
