# SGLang server config — Qwen/Qwen-Image-2512 (multimodal image generation)
# Parsed by utils/parse_config.sh; consumed by sglang/sglang_server.sh, sglang/run_docker.sh.
#
# launch_mode=multimodal_gen uses python3 run_qwen-image.sh (sglang.multimodal_gen)
# instead of sglang.launch_server; max_model_len / max_running_requests are not needed.

framework=sglang               # vllm | sglang | suinferllm
launch_mode=multimodal_gen

model_weights=qwen-image

port=38000
served_model_name=Qwen/Qwen-Image-2512

tensor_parallel_size=1

# Image-generation offload settings
output_path=./outputs/
dit_cpu_offload=True
dit_layerwise_offload=True
image_encoder_cpu_offload=True
text_encoder_cpu_offload=False
vae_cpu_offload=True

extra_env=""
extra_sglang_args=""

docker_image=birensupa-smartinfer-sglang:26.04.rc2-py310-pt2.9.0-br1xx
k8s_image=172.25.198.36:32000/infer/birensupa-smartinfer-sglang:26.04.rc2-py310-pt2.9.0-br1xx

# Kubernetes deployment
k8s_nodeport=30901
