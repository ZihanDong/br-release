# SGLang server config — Qwen/Qwen-Image-2512 (multimodal image generation)
# Parsed by utils/parse_config.sh; consumed by sglang/sglang_server.sh, sglang/run_docker.sh.
#
# launch_mode=multimodal_gen uses python3 run_qwen-image.sh (sglang.multimodal_gen)
# instead of sglang.launch_server; max_model_len / max_running_requests are not needed.

framework=sglang               # vllm | sglang | suinferllm
launch_mode=multimodal_gen

model_weights=qwen-image

port=38000
served_model_name=Qwen/Qwen-Image-2512

tensor_parallel_size=1

# Image-generation offload settings
output_path=./outputs/
dit_cpu_offload=True
dit_layerwise_offload=True
image_encoder_cpu_offload=True
text_encoder_cpu_offload=False
vae_cpu_offload=True

# run_qwen-image.sh already exports the required BRTB/SUDNN env (SUPA_FALLBACK,
# NCDHW, FORCE_EAGER_CONV2D, ALPHA_BETA=false). No extra attention flags needed on
# the c059 build below. NOTE: the c064s001t001 build hits a fatal SUPA kernel error
# (shapeTransformQKV ... not support BB for not large input) during the DiT
# attention — use the c059s001t004 build, which generates correctly on BR166.
extra_env=""
extra_sglang_args=""

# docker_image / k8s_image are the DEFAULT base image (used when no --env is given).
# qwen-image additionally needs cache_dit installed — run with the matching image-list
# entry to provision it, e.g.:
#   run_docker.sh   --run --env 2604-rc2 qwen-image
#   k8s_yaml_gen.sh --task deploy --gpu --env 2604-rc2 sglang_qwen-image
# (sglang/sglang_images.list -> installs cache_dit==1.3.4). Must use the c059s001t004
# build: 26.04.rc2 lacks the diffusion stack and c064s001t001 hits a fatal SUPA
# attention kernel error. See README "Qwen-Image deps".
docker_image=birensupa-smartinfer-sglang:26.06.02-c059s001t004b24295-py310-pt2.9.0-br1xx
k8s_image=172.25.198.36:32000/infer/birensupa-smartinfer-sglang:26.06.02-c059s001t004b24295-py310-pt2.9.0-br1xx

# Kubernetes deployment
k8s_nodeport=30901
