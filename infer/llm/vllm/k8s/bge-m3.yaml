# vLLM server — BAAI/bge-m3 (embedding)
#
# GPU:        1 × Biren166M
# Port:       28800 (container) → NodePort 30800
# Access:     http://<node-ip>:30800/v1/embeddings
#
# Deploy:     kubectl apply -f bge-m3.yaml
# Remove:     kubectl delete -f bge-m3.yaml
# Logs:       kubectl logs -n vllm -l app=vllm-bge-m3 -f
# Curl test:
#   curl -s http://10.49.4.248:30800/v1/embeddings \
#     -H 'Content-Type: application/json' \
#     -d '{"model": "/data/models/BAAI/bge-m3", "input": "Hello, world!"}' \
#     | python3 -m json.tool

---
apiVersion: v1
kind: Namespace
metadata:
  name: vllm

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-bge-m3
  namespace: vllm
  labels:
    app: vllm-bge-m3
    model: bge-m3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-bge-m3
  template:
    metadata:
      labels:
        app: vllm-bge-m3
        model: bge-m3
    spec:
      # Use biren-container-runtime to inject BIREN_VISIBLE_DEVICES and SDK library paths
      runtimeClassName: biren
      # Pin to the node that holds the model weights and BirenTech driver
      nodeName: pj-3f-server008

      containers:
      - name: vllm-server
        image: 10.49.4.248:32000/infer/birensupa-smartinfer-vllm:26.04.beta1-py310-pt2.8.0-br1xx
        imagePullPolicy: IfNotPresent

        # No `command` override — let the image entrypoint (biren_entrypoint.sh) run first.
        # The entrypoint sets LD_LIBRARY_PATH for the BirenTech SDK, then exec's "$@".
        args:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        - --host
        - "0.0.0.0"
        - --port
        - "28800"
        - --model
        - /data/models/BAAI/bge-m3
        - --task
        - embed
        - --trust_remote_code
        - --dtype
        - bfloat16
        - --kv_cache_dtype
        - auto
        - --max_model_len
        - "8192"
        - --max_num_seqs
        - "64"
        - --tensor_parallel_size
        - "1"
        - --pipeline_parallel_size
        - "1"
        - --data_parallel_size
        - "1"
        - --gpu_memory_utilization
        - "0.8"
        - --enforce_eager

        env:
        - name: VLLM_USE_V1
          value: "1"
        - name: VLLM_WORKER_MULTIPROC_METHOD
          value: spawn
        - name: VLLM_BR_WEIGHT_TYPE
          value: NUMA

        ports:
        - name: http
          containerPort: 28800
          protocol: TCP

        resources:
          requests:
            birentech.com/gpu: "1"
            cpu: "8"
            memory: "32Gi"
          limits:
            birentech.com/gpu: "1"
            cpu: "16"
            memory: "64Gi"

        securityContext:
          capabilities:
            add:
            - IPC_LOCK

        readinessProbe:
          httpGet:
            path: /health
            port: 28800
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 28800
          initialDelaySeconds: 180
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 5

        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
        - name: model-weights
          mountPath: /data/models
          readOnly: true

      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 256Gi
      - name: model-weights
        hostPath:
          path: /data/models
          type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-bge-m3
  namespace: vllm
  labels:
    app: vllm-bge-m3
    model: bge-m3
spec:
  type: NodePort
  selector:
    app: vllm-bge-m3
  ports:
  - name: http
    port: 28800
    targetPort: 28800
    nodePort: 30800
    protocol: TCP
