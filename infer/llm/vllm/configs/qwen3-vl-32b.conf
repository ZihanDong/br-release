# vLLM server config — Qwen/Qwen3-VL-32B-Instruct (vision-language chat model)
# Used by: run_docker.sh  k8s_yaml_gen.sh

model_weights=qwen3-vl-32b

port=28802
served_model_name=Qwen/Qwen3-VL-32B-Instruct
task=
dtype=auto

max_model_len=32768
max_num_seqs=64

tensor_parallel_size=2
pipeline_parallel_size=1
gpu_memory_utilization=0.8

enable_chunked_prefill=true
enforce_eager=false
distributed_executor_backend=mp
compilation_config='{"cudagraph_mode": "FULL_DECODE_ONLY"}'

# Kubernetes deployment
k8s_nodeport=30803

# 26.05.14 image produces garbled output for VL models; pin to 26.04.rc2
docker_image=birensupa-smartinfer-vllm:26.04.rc2-py310-pt2.8.0-br1xx
k8s_image=172.25.198.36:32000/infer/birensupa-smartinfer-vllm:26.04.rc2-py310-pt2.8.0-br1xx
