# BGE-M3 on a 1/2 Biren SVI vGPU (demo).
# Inherits the base bge-m3.conf, then pins the on-node vLLM image and a
# dedicated port/nodeport so it can run alongside the 1/4 variant.
# Generate with:  bash k8s_yaml_gen.sh --task deploy --vgpu half bge-m3-vgpu-half
source "$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/bge-m3.conf"

# This vLLM build dropped --task; use the equivalent --runner/--convert flags.
task=""
extra_vllm_args="--runner pooling --convert embed"

port=28800
k8s_nodeport=30800
k8s_image=10.49.4.248:32000/infer/birensupa-smartinfer-vllm:26.05.14-py310-pt2.8.0-br1xx
