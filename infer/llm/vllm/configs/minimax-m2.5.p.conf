# vLLM PD-separation config — MiniMax-M2.5-INT8 Prefill node (kv_producer)
# Used by: run_docker.sh + vllm_server_pd.sh (requires a .proxy.conf as 2nd arg)
# Suffix .p.conf marks this as the Prefill (kv_producer) node.

model_weights=minimax-m2.5

port=20003
http_ip=172.25.198.36
dp_size=1

served_model_name=Minimax-M2.5-INT8
dtype=bfloat16

max_model_len=70000
max_num_seqs=8
max_num_batched_tokens=4096

tensor_parallel_size=8
pipeline_parallel_size=1
gpu_memory_utilization=0.75

enforce_eager=true
enable_chunked_prefill=true
distributed_executor_backend=mp
compilation_config='{"cudagraph_mode": "FULL_DECODE_ONLY"}'

# SUCCL inter-node KV-transfer network interface (use `ip addr` to confirm)
succl_socket_ifname=p21p2

# MiniMax MoE-specific env vars
extra_env="VLLM_BR_EMBEDDING_S0B=1 BRTB_CHUNK_PREFILL_ATTN_HIGH_PERFORMANCE=true BRTB_ENABLE_SCCL_FUSION=0 VLLM_BR_USE_FUSED_MINIMAX_MOE=1 VLLM_BR_USE_FUSED_ADD_RMSNORM_QKV_TP_ROPE_KVCACHE=0 SUCCL_REDUCE_SEQUENCE=0"

# MiniMax MoE-specific vLLM flags
extra_vllm_args="--enable_expert_parallel --no_enable_prefix_caching"
