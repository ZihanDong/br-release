# vLLM server config — BAAI/bge-m3 (embedding model)
# Used by: start_vllm_server.sh  start_vllm_k8s.sh

model_weights=bge-m3

port=28800
served_model_name=
task=embed
dtype=bfloat16

max_model_len=8192
max_num_seqs=64

tensor_parallel_size=1
pipeline_parallel_size=1
gpu_memory_utilization=0.8

enable_chunked_prefill=false
enforce_eager=true
distributed_executor_backend=
compilation_config=

# Kubernetes deployment
k8s_nodeport=30800
k8s_node_name=
