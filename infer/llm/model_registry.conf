# Model registry — one section per model
# Fields:
#   local_path      — absolute path to weights on host (leave empty if not downloaded)
#   huggingface_id  — repo ID for `huggingface-cli download <id>`
#   modelscope_id   — repo ID for `modelscope download --model <id>`

[bge-m3]
local_path=/data/models/BAAI/bge-m3
huggingface_id=BAAI/bge-m3
modelscope_id=BAAI/bge-m3

[qwen3-32b]
local_path=/data/models/Qwen/Qwen3-32B
huggingface_id=Qwen/Qwen3-32B
modelscope_id=Qwen/Qwen3-32B

[minimax-m2.5]
local_path=/data/models/MiniMax/MiniMax-M2.5-INT8
huggingface_id=MiniMax/MiniMax-M2.5
modelscope_id=MiniMax/MiniMax-M2.5
