# Model registry — one section per model
# Fields:
#   local_path      — absolute path to weights on host (leave empty if not downloaded)
#   huggingface_id  — repo ID for `huggingface-cli download <id>`
#   modelscope_id   — repo ID for `modelscope download --model <id>`
[DEFAULT]
ROOT_PATH=/data/models

[bge-m3]
local_path=${ROOT_PATH}/BAAI/bge-m3
download_name=BAAI/bge-m3

[qwen3-32b]
local_path=${ROOT_PATH}/Qwen/Qwen3-32B
download_name=Qwen/Qwen3-32B

[minimax-m2.5]
local_path=/data/models/MiniMax/MiniMax-M2.5-INT8
download_name=

[qwen3-vl-32b]
local_path=${ROOT_PATH}/Qwen/Qwen3-VL-32B-Instruct
download_name=Qwen/Qwen3-VL-32B-Instruct

[qwen-image]
local_path=${ROOT_PATH}/Qwen/Qwen-Image-2512
download_name=Qwen/Qwen-Image-2512

# Wan2.2 video generation — MUST be diffusers format (model_index.json present).
# The ModelScope layout at ${ROOT_PATH}/Wan-AI/Wan2.2-{T2V,I2V}-A14B
# (high_noise_model/low_noise_model/*.pth) is NOT loadable by sglang.multimodal_gen.
[wan2.2-t2v-a14b]
local_path=${ROOT_PATH}/Wan-AI/Wan2.2-T2V-A14B-Diffusers
download_name=Wan-AI/Wan2.2-T2V-A14B-Diffusers

[wan2.2-i2v-a14b]
local_path=${ROOT_PATH}/Wan-AI/Wan2.2-I2V-A14B-Diffusers
download_name=Wan-AI/Wan2.2-I2V-A14B-Diffusers
