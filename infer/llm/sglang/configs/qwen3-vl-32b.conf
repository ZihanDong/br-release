# SGLang server config — Qwen/Qwen3-VL-32B-Instruct (vision-language model)
# Used by: sglang_server.sh  run_docker.sh  k8s_yaml_gen.sh

model_weights=qwen3-vl-32b

port=28800
served_model_name=Qwen/Qwen3-VL-32B-Instruct

max_model_len=32768
max_running_requests=64

tensor_parallel_size=4
pipeline_parallel_size=1
mem_fraction_static=0.85
page_size=128

disable_radix_cache=true
trust_remote_code=true

extra_env=""
extra_sglang_args=""

# Kubernetes deployment
k8s_nodeport=30900
