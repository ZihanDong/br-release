# vllm bench client config — MiniMax-M2.5 performance test (siming)
# Used by: run_test.sh

# ── Model API connection ────────────────────────────────────────────────────────
# model_weights: model path as registered on the vllm server (used for --model in API calls)
# When served_model_name is empty, vllm uses the model path as the model identifier.
model_weights=/data/models/MiniMax/MiniMax-M2.5-INT8
port=20027
served_model_name=Minimax-M2.5-INT8
api_format=openai

# ── Fixed benchmark parameters (one value per config file) ─────────────────────
host=172.25.198.36
dataset_name=random
tokenizer=/data/models/MiniMax/MiniMax-M2.5-INT8
trust_remote_code=true
ignore_eos=true
top_p=1
top_k=-1
temperature=0

# ── Variable test cases ────────────────────────────────────────────────────────
# Format: "input_len output_len concurrency num_prompts"
# run_test.sh will iterate over all entries and run each as a separate benchmark.
test_cases=(
    "2000 500 1 10" 
    "2000 500 8 80" 
    "2000 500 64 640" 
)
